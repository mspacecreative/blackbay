<!DOCTYPE html>
<html>
	<head>
		<title>BlackBay Investments</title>
		<style>
			html, body {
			height: 100%;
		}
		
		body {
			background: #000;
			margin: 0;
			position: relative;
		}
			.container {
			margin: auto;
			max-width: 600px;
			width: 90%;
			height: 100%;
		}
			.img-container {
			position: absolute;
			top: 50%;
			left: 50%;
			-moz-transform: translate(-50%,-50%);
			-webkit-transform: translate(-50%,-50%);
			-o-transform: translate(-50%,-50%);
			-ms-transform: translate(-50%,-50%);
			transform: translate(-50%,-50%);
		}
		
		.container img {
			display: block;
			text-align: center;
			width: 100%;
			height: auto;
		}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="img-container">
				<img src="img/blackbay.png" />
			</div>
		</div>
	</body>
</html>
